    <header>
        <div class="logo">

        <nav>
            <ul>
                <li><a href="../index.html">Início</a></li>

        </nav>

    <main class="container-form">
        <h2>Criar Pergaminho de Acesso</h2>
        
        <!-- form basico do pdf 7 -->
        <form action="../index.html" method="get">
            
            <!-- input text padrao pra string -->
            <label>Nome Completo do Viajante:</label>
            <input type="text" name="nome" required placeholder="Digite seu nome">

            <!-- input email q ja faz a validacao automatica do @ (pdf 7) -->
            <label>E-mail de Contato:</label>
            <input type="email" name="email" required placeholder="bruxo@hogwarts.com">

            <!-- input password q oculta os caracteres digitados -->
            <label>Senha de Proteção (Feitiço):</label>
            <input type="password" name="senha" required placeholder="Sua senha secreta">

            <div class="botoes-form">
                <!-- botoes submit e reset q o prof exigiu -->
                <input type="submit" value="Criar Conta">
                <input type="reset" value="Limpar Tudo">
            </div>
        </form>
    </main>
